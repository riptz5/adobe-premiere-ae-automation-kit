name: AI Agent Dev Orchestrator

on:
  issues:
    types: [opened, edited]

jobs:
  feature_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Auditar Issue (sin ramas nuevas)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          ISSUE_NUMBER=${{ github.event.issue.number }}
          echo "Issue Body:" > ISSUE_BODY.txt
          echo "${{ github.event.issue.body }}" >> ISSUE_BODY.txt
          echo "Audit: Política main-only. No se creará ninguna rama nueva. Issue body guardado localmente."
        shell: bash

      # No comentar en el issue para evitar notificaciones

      - name: Procesar Issue y commitear en main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_BODY="${{ github.event.issue.body }}"
          LOG_FILE="issue_${ISSUE_NUMBER}_autoresuelto.log"
          echo "Procesando Issue #$ISSUE_NUMBER: $ISSUE_BODY"
          # No sobrescribir log existente
          if [ -f "$LOG_FILE" ]; then
            echo "Log file $LOG_FILE already exists, skipping."
            exit 0
          fi
          # Aquí iría la lógica de generación de código/tests/configs según el Issue
          echo "$ISSUE_BODY" > "$LOG_FILE"
          git add "$LOG_FILE"
          # Evitar commits vacíos
          if git diff --cached --quiet; then
            echo "No hay cambios para commitear."
            exit 0
          fi
          git commit -m "chore: auto-resolve issue #$ISSUE_NUMBER"
          # Retry push with pull/rebase to avoid collisions
          for i in {1..5}; do
            git pull --rebase origin main || true
            if git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }} main; then
              break
            fi
            sleep $((RANDOM % 5 + 1))
          done
          # Cerrar issue sin comentario para evitar notificaciones
          gh issue close "$ISSUE_NUMBER"
        shell: bash

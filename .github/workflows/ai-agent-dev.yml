name: AI Agent Dev Orchestrator

on:
  issues:
    types: [opened, edited]

jobs:
  feature_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Read Issue and Create Feature Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          ISSUE_NUMBER=${{ github.event.issue.number }}
          # Sanitizar el título para nombre de rama válido
          ISSUE_TITLE_RAW="${{ github.event.issue.title }}"
          # Reemplazar espacios, dos puntos, tildes y otros caracteres no válidos
          ISSUE_TITLE=$(echo "$ISSUE_TITLE_RAW" | iconv -f utf8 -t ascii//TRANSLIT | sed 's/[^A-Za-z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          BRANCH_NAME="feature/issue-${ISSUE_NUMBER}-${ISSUE_TITLE}"
          echo "Creating branch: $BRANCH_NAME"
          git checkout -b "$BRANCH_NAME"
          echo "Issue Body:" > ISSUE_BODY.txt
          echo "${{ github.event.issue.body }}" >> ISSUE_BODY.txt
          git add ISSUE_BODY.txt
          git commit -m "chore: init branch for issue #${ISSUE_NUMBER}"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }} "$BRANCH_NAME"
          echo "Branch $BRANCH_NAME created and pushed."
        shell: bash

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🚀 Feature branch [$BRANCH_NAME] created for this issue."
        shell: bash

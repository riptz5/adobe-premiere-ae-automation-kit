<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AutoKit Local Dashboard</title>
  <style>
    :root {
      --bg: #0b0f14;
      --bg-2: #101621;
      --panel: #121a26;
      --panel-2: #0f1621;
      --text: #e6eef7;
      --muted: #9aa6b6;
      --accent: #5eead4;
      --accent-2: #7dd3fc;
      --border: #223145;
      --glow: rgba(94, 234, 212, 0.2);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% 0%, #142033 0%, transparent 60%),
                  radial-gradient(900px 500px at 95% 10%, #0d2a28 0%, transparent 65%),
                  linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
    }
    header {
      padding: 28px 28px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 20px; letter-spacing: 0.3px; }
    .status-pill {
      background: #0f1c2b;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--muted);
    }
    main { padding: 24px 28px 48px; display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 18px; }
    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 20px 40px rgba(0,0,0,0.25);
      animation: fadeUp 420ms ease both;
    }
    .card h2 { margin: 0 0 12px; font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 1.4px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 6px; }
    input, textarea, select {
      width: 100%;
      background: #0d141d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
    }
    textarea { min-height: 150px; resize: vertical; }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b0f14;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .log {
      background: #0b111a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      max-height: 260px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .list { display: grid; gap: 10px; }
    .job {
      background: #0c121b;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
    }
    .job strong { color: var(--accent); }
    .muted { color: var(--muted); }
    .steps { display: grid; gap: 10px; font-size: 13px; color: var(--muted); }
    .steps div { background: #0b111a; border: 1px dashed var(--border); border-radius: 10px; padding: 10px; }
    .accent { color: var(--accent); }
    .tabs { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .tab {
      background: #0d141d;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .tab.active { color: var(--text); border-color: var(--accent); box-shadow: 0 0 0 1px var(--glow); }
    .tab-panel { display: none; gap: 8px; }
    .tab-panel.active { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 6px; background: #0b111a; border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
    .field input, .field select { width: 100%; }
    .pill-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .pill-buttons button { padding: 8px 10px; font-size: 12px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>AutoKit Local Dashboard</h1>
    <div class="status-pill" id="statusPill">status: loading...</div>
  </header>
  <main>
    <section class="card">
      <h2>Analyze Transcript</h2>
      <label>Profile</label>
      <select id="profileSelect"></select>
      <label>Transcript (VTT/SRT/TXT)</label>
      <textarea id="transcriptInput" placeholder="Paste transcript..."></textarea>
      <div class="row">
        <button id="analyzeBtn">Analyze</button>
        <button class="secondary" id="clearAnalyzeBtn">Clear</button>
      </div>
      <label>Result</label>
      <div class="log" id="analyzeOutput">...</div>
    </section>

    <section class="card">
      <h2>Create Job (Media or Transcript)</h2>
      <label>Profile</label>
      <select id="jobProfileSelect"></select>
      <label>Media Path (local)</label>
      <input id="mediaPathInput" placeholder="/path/video.mp4"/>
      <label>Transcript (optional)</label>
      <textarea id="jobTranscriptInput" placeholder="Paste transcript or leave empty if mediaPath is set"></textarea>
      <div class="row">
        <button id="jobCreateBtn">Create + Run</button>
        <button class="secondary" id="jobCreateOnlyBtn">Create Only</button>
      </div>
      <label>Job Response</label>
      <div class="log" id="jobOutput">...</div>
    </section>

    <section class="card">
      <h2>Jobs</h2>
      <div class="row">
        <button id="refreshJobsBtn">Refresh</button>
        <button class="secondary" id="loadConfigBtn">Load Config</button>
      </div>
      <div class="list" id="jobsList"></div>
    </section>

    <section class="card">
      <h2>Media Tools</h2>
      <label>Media Path (local)</label>
      <input id="mediaToolsPath" placeholder="/path/video.mp4"/>
      <div class="row">
        <button id="qaBtn">Run QA</button>
        <button class="secondary" id="normalizeBtn">Normalize Audio</button>
      </div>
      <div class="row">
        <button id="sceneBtn">Scene Detect</button>
        <button class="secondary" id="reframeBtn">Reframe 9:16</button>
      </div>
      <label>B-roll Text</label>
      <input id="brollText" placeholder="keywords or summary..."/>
      <div class="row">
        <button id="brollBtn">Suggest B-roll</button>
      </div>
      <label>Media Output</label>
      <div class="log" id="mediaOutput">...</div>
      <label>Config Snapshot</label>
      <div class="log" id="configOutput">...</div>
    </section>

    <section class="card">
      <h2>Config local</h2>
      <div class="tabs" id="configTabs"></div>
      <div class="tab-panel active" id="configPane"></div>
      <div class="pill-buttons">
        <button class="secondary" id="loadConfigUiBtn">Load UI</button>
        <button class="secondary" id="saveConfigUiBtn">Save UI</button>
        <button class="secondary" id="loadProfileBtn">Load Profile</button>
        <button class="secondary" id="saveProfileBtn">Save Profile</button>
        <button class="secondary" id="newProfileBtn">New profile</button>
        <button class="secondary" id="cloneProfileBtn">Clone profile</button>
        <button class="secondary" id="deleteProfileBtn">Delete profile</button>
      </div>
      <label>Editor JSON (avanzado)</label>
      <textarea id="configEditor" placeholder="JSON de config local..."></textarea>
      <div class="row">
        <button id="loadLocalConfig">Cargar</button>
        <button class="secondary" id="saveLocalConfig">Guardar</button>
      </div>
      <div class="log" id="configEditorMessage">...</div>
    </section>
  </main>
  <script src="./main.js"></script>
</body>
</html>

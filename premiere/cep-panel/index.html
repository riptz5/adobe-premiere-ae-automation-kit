<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>AutoKit Panel</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 14px; }
    h1 { font-size: 16px; margin: 0 0 10px; }
    button { width: 100%; padding: 10px; margin: 6px 0; border-radius: 10px; border: 1px solid #ccc; background: #f7f7f7; cursor: pointer; }
    button:hover { background: #efefef; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
    textarea { width: 100%; height: 140px; margin-top: 8px; border-radius: 10px; border: 1px solid #ccc; padding: 8px; }
    input, select { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid #ccc; }
    .small { font-size: 12px; opacity: 0.75; }
    pre { white-space: pre-wrap; background: #111; color: #eee; padding: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>AutoKit (Premiere CEP)</h1>

  <div class="small">Servidor (LLM/orquestación) URL</div>
  <input id="serverUrl" value="http://localhost:8787" />

  <div class="small">Profile</div>
  <select id="profile">
    <option value="shorts">shorts</option>
  </select>

  <div class="row">
    <button id="btnProjectInfo">Project info</button>
    <button id="btnPingServer">Ping server</button>
  </div>

  <button id="btnImportAndOrganize">Importar & organizar media (elige carpeta)</button>
  <button id="btnApplyMarkersFromJSON">Aplicar markers (pega JSON abajo)</button>

  <button id="btnAnalyzeTranscript">Analizar transcript (VTT o texto) -> markers</button>
  <textarea id="transcript" placeholder="Pega transcript (VTT recomendado)"></textarea>

  <textarea id="markersJson" placeholder="Pega JSON con {markers:[{timeSec,name,comment,type}] }"></textarea>

  <button id="btnAnalyzeMediaApply">Analizar media (STT+LLM) -> markers + auto edit</button>
  <button id="btnApplySegments">Aplicar segments (keep/remove) a la secuencia</button>

  <div class="row">
    <button id="btnExportAME">Export via Media Encoder</button>
    <button id="btnUploadFrameio">Upload to Frame.io (script externo)</button>
  </div>

  <pre id="log"></pre>

  <script src="./CSInterface.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>

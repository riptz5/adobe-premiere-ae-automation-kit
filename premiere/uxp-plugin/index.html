<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    body { font-family: system-ui; margin: 12px; }
    button { width: 100%; padding: 10px; margin: 6px 0; border-radius: 12px; }
    textarea { width: 100%; height: 180px; }
    input { width: 100%; padding: 8px; }
    pre { white-space: pre-wrap; background: #111; color: #eee; padding: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <h3>AutoKit UXP</h3>
  <div>Server URL</div>
  <input id="serverUrl" value="http://localhost:8787" />
  <button id="btnMarkers">Fetch markers from transcript</button>
  <textarea id="transcript" placeholder="Pega transcript (VTT recomendado)"></textarea>
  <button id="btnApply">Apply markers to active sequence</button>
  <textarea id="markersJson" placeholder="Markers JSON"></textarea>
  <pre id="log"></pre>
  <script src="main.js"></script>
</body>
</html>
